<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPH AI Judgment Challenge</title>
<style>
body{font-family:Arial,sans-serif;font-size: 24px;background:#eef3f8;margin:0}
main{max-width:820px;margin:auto;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
button{display:block;width:100%;margin:10px 0;padding:14px;border-radius:10px;border:2px solid #ccc;font-size:1rem;background:white;cursor:pointer}
button:hover{background:#f7f7f7} button:focus{outline:3px solid #2563eb}
#fb{display:none;padding:16px;border-radius:10px;margin-top:15px}
.next{display:none;width:auto}
.barwrap{background:#ddd;height:10px;border-radius:6px} .bar{height:10px;width:0;background:#2563eb;border-radius:6px}
.good{background:#e8f8ec} .dep{background:#fff6d6} .bad{background:#fde8e8}
</style></head><body><main>
<h1>SPH AI Judgment Challenge</h1>
<p>Apply your course's AI policy to realistic scenarios.</p>
<div class="barwrap"><div id="bar" class="bar"></div></div>
<p id="prog"></p>
<section class="card">
<h2 id="title"></h2><p id="text"></p>
<div id="answers"></div>
<div id="fb" tabindex="-1"></div>
<button id="next" class="next">Next Scenario</button>
</section></main>
<script>
//=====================
// TEACHER-EDITABLE CONTENT
//=====================
const SCENARIOS=[{title:'Scenario 1',text:'While studying for an Epidemiology test, you use AI to explain the difference between prevalence and incidence.',answer:'Appropriate',explanation:'AI is acting as a tutor.',policy:'Learning support is encouraged.'},
{title:'Scenario 2',text:'Use AI to summarize a CDC report before you read it.',answer:'Appropriate',explanation:'AI helps you prepare for learning.',policy:'Verify important details yourself.'},
{title:'Scenario 3',text:'Use AI suggest additional PubMed search terms.',answer:'Appropriate',explanation:'AI supports literature searching.',policy:'You still conduct and evaluate the search.'},
{title:'Scenario 4',text:'Use AI to explain a SAS error message.',answer:'Appropriate',explanation:'AI is helping you troubleshoot.',policy:'You remain responsible for your analysis.'},
{title:'Scenario 5',text:'Use AI to Quiz you before an exam.',answer:'Appropriate',explanation:'Practice questions support learning.',policy:'Use them to study, not replace studying.'},
{title:'Scenario 6',text:"Use AI to identify possible themes across articles you've already read.",answer:'Depends',explanation:'Useful for brainstorming, but verify every theme.',policy:'You are responsible for the synthesis.'},
{title:'Scenario 7',text:'Use AI to suggest possible research questions after your literature review.',answer:'Depends',explanation:'Brainstorming is acceptable if you refine the ideas.',policy:'The final question should reflect your own thinking.'},
{title:'Scenario 8',text:'Use AI to improve the grammar of a paragraph you wrote.',answer:'Depends',explanation:'Editing may be acceptable depending on course policy.',policy:'Ideas and authorship must remain yours.'},
{title:'Scenario 9',text:'Use AI to review your study aims for clarity.',answer:'Depends',explanation:'Feedback is different from writing the content.',policy:'You decide the final wording.'},
{title:'Scenario 10',text:'Use AI to suggest an outline for your discussion section.',answer:'Depends',explanation:'Organization help may be acceptable.',policy:'You must write the discussion yourself.'},
{title:'Scenario 11',text:'Use AI to write your discussion section.',answer:'Not Appropriate',explanation:'This replaces your required intellectual work.',policy:'Submitted work should represent your own thinking.'},
{title:'Scenario 12',text:'Use AI to write your discussion board post with minor edits.',answer:'Not Appropriate',explanation:'The substantive content was produced by AI.',policy:'Course participation should reflect your own ideas.'},
{title:'Scenario 13',text:'Use AI to generate a literature review to submit.',answer:'Not Appropriate',explanation:'AI is completing the assignment.',policy:'This misrepresents authorship.'},
{title:'Scenario 14',text:"Use AI to rewrite another author's work to appear original.",answer:'Not Appropriate',explanation:'This is plagiarism.',policy:'Academic integrity still applies.'},
{title:'Scenario 15',text:'Use AI to interpret your regression results and submit the interpretation without reviewing it.',answer:'Not Appropriate',explanation:'Critical interpretation is your responsibility.',policy:'Do not outsource required analysis.'}];
//=====================
const choices=["Appropriate","Depends","Not Appropriate"];
let i=0,score=0;
const t=title,x=text,a=answers,f=fb,b=bar,p=prog,n=next;
function show(){
 let q=SCENARIOS[i];
 t.textContent=q.title;
 x.textContent=q.text;
 p.textContent=`Scenario ${i+1} of ${SCENARIOS.length}`;
 b.style.width=(i/SCENARIOS.length*100)+"%";
 a.innerHTML=""; f.style.display="none"; n.style.display="none";
 choices.forEach(c=>{let bt=document.createElement('button');bt.textContent=c;bt.onclick=()=>check(c);a.appendChild(bt);});
}
function check(c){
 let q=SCENARIOS[i];
 [...a.children].forEach(z=>z.disabled=true);
 if(c===q.answer)score++;
 f.className=q.answer=="Appropriate"?"good":q.answer=="Depends"?"dep":"bad";
 f.innerHTML=`<strong>Best judgment: ${q.answer}</strong><p>${q.explanation}</p><p><strong>Policy connection:</strong> ${q.policy}</p>`;
 f.style.display="block";f.focus();n.style.display="inline-block";
}
n.onclick=()=>{i++;if(i>=SCENARIOS.length){document.querySelector('.card').innerHTML=`<h2>Finished!</h2><p>Your score: <strong>${score}/${SCENARIOS.length}</strong></p><button onclick="location.reload()">Try Again</button>`;b.style.width="100%";p.textContent="Complete";}else show();};
show();
</script></body></html>
