<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epidemiology Study Design Selector</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;color:#1a1a1a;background:#f5f4f0;min-height:100vh;padding:1rem}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f0efe9;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#555550;
  --color-text-tertiary:#888780;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.25);
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a27;
    --color-text-primary:#f0efe9;
    --color-text-secondary:#b4b2a9;
    --color-text-tertiary:#888780;
    --color-border-tertiary:rgba(255,255,255,0.12);
    --color-border-secondary:rgba(255,255,255,0.25);
  }
  body{background:#161614;color:#f0efe9}
  .tag.yes{background:#173404!important;color:#C0DD97!important;border-color:#3B6D11!important}
  .tag.no{background:#501313!important;color:#F7C1C1!important;border-color:#A32D2D!important}
  .tag.maybe{background:#412402!important;color:#FAC775!important;border-color:#854F0B!important}
  .mod-btn.active{background:#26215C!important;border-color:#534AB7!important;color:#CECBF6!important}
  .modifier-note{border-left-color:#534AB7!important}
}
.app{max-width:680px;margin:0 auto;padding:1.5rem 1rem 2rem}
.header{margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:500;margin-bottom:4px}
.header p{font-size:14px;color:var(--color-text-secondary);line-height:1.5}
.progress-bar{display:flex;gap:4px;margin-bottom:1.5rem;flex-wrap:wrap}
.progress-step{height:4px;flex:1;min-width:20px;background:var(--color-border-tertiary);border-radius:2px;transition:background 0.3s}
.progress-step.done{background:#1D9E75}
.progress-step.active{background:#7F77DD}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.25rem 1rem}
.step-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.question{font-size:17px;font-weight:500;line-height:1.4;margin-bottom:6px}
.question-hint{font-size:13px;color:var(--color-text-secondary);line-height:1.5;margin-bottom:1.1rem}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;text-align:left;transition:border-color 0.15s,background 0.15s;font-family:system-ui,-apple-system,sans-serif;color:var(--color-text-primary);font-size:14px;line-height:1.45;width:100%}
.opt-btn:hover{border-color:var(--color-border-secondary);background:var(--color-background-primary)}
.opt-btn:focus{outline:2px solid #7F77DD;outline-offset:2px}
.opt-icon{font-size:18px;margin-top:1px;flex-shrink:0;color:var(--color-text-secondary)}
.opt-text strong{display:block;font-weight:500;font-size:14px}
.opt-text span{font-size:12px;color:var(--color-text-secondary);line-height:1.4}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-secondary);font-family:system-ui,-apple-system,sans-serif;margin-top:10px;transition:border-color 0.15s}
.back-btn:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.back-btn:focus{outline:2px solid #7F77DD;outline-offset:2px}
.result-card{border-radius:var(--border-radius-lg);overflow:hidden}
.result-header{padding:1.25rem 1.25rem 1rem}
.result-name{font-size:21px;font-weight:500;margin-bottom:4px}
.result-tagline{font-size:13px;opacity:0.85;line-height:1.45}
.result-body{background:var(--color-background-primary);padding:1.25rem}
.result-section{margin-bottom:1rem}
.result-section:last-child{margin-bottom:0}
.result-section h3{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-tertiary);margin-bottom:6px}
.result-section p,.result-section li{font-size:13px;color:var(--color-text-secondary);line-height:1.55}
.result-section ul{padding-left:14px}
.result-section li{margin-bottom:3px}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:100px;border:0.5px solid}
.tag.yes{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.tag.no{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}
.tag.maybe{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.famous-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:4px}
.famous-card h4{font-size:13px;font-weight:500;margin-bottom:2px}
.famous-card p{font-size:12px;color:var(--color-text-secondary);line-height:1.45}
.restart-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-family:system-ui,-apple-system,sans-serif;color:var(--color-text-primary);margin-top:1rem;transition:background 0.15s}
.restart-btn:hover{background:var(--color-background-secondary)}
.breadcrumb{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1rem;align-items:center;min-height:1.2rem}
.bc-item{font-size:11px;color:var(--color-text-tertiary)}
.bc-sep{font-size:11px;color:var(--color-text-tertiary)}
.modifier-section{margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.modifier-section h3{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-tertiary);margin-bottom:8px}
.modifier-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mod-btn{padding:7px 10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-size:12px;font-family:system-ui,-apple-system,sans-serif;color:var(--color-text-secondary);text-align:left;transition:all 0.15s;line-height:1.35}
.mod-btn:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.mod-btn.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.modifier-note{font-size:12px;color:var(--color-text-secondary);margin-top:8px;line-height:1.5;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:2px solid #7F77DD}
</style>
</head>
<body>
<div class="app" role="main">
  <div class="header">
    <h1>Study design selector</h1>
    <p>Answer each question to find the best analytical epidemiology study design for your research scenario.</p>
  </div>
  <div class="progress-bar" id="progressBar" aria-label="Progress through decision tree"></div>
  <div class="breadcrumb" id="breadcrumb" aria-label="Decision path"></div>
  <div id="stepContainer"></div>
</div>

<script>
const CONTENT = {
  maxSteps: 9,
  steps: {
    s1: {
      label: "Step 1 of 9 — research approach",
      question: "Can you randomly assign participants to exposures or interventions?",
      hint: "This is the most fundamental distinction. Random assignment to exposure groups is only possible when it is safe and ethical to do so.",
      options: [
        { icon: "ti-flask", label: "Yes — I can randomise participants", sub: "Allocation to exposure is under investigator control", next: "s_rct" },
        { icon: "ti-eye", label: "No — I must observe naturally occurring exposure", sub: "Exposure has already happened or cannot be controlled", next: "s2" }
      ]
    },
    s2: {
      label: "Step 2 of 9 — participant selection",
      question: "How will you select participants into the study?",
      hint: "This defines your sampling frame and shapes the study architecture.",
      options: [
        { icon: "ti-virus", label: "Based on whether they have the outcome (disease/event)", sub: "Select cases with the disease and controls without it", next: "s3a" },
        { icon: "ti-user-check", label: "Based on their exposure status", sub: "Select exposed and unexposed groups, then follow them", next: "s3b" }
      ]
    },
    s3a: {
      label: "Step 3 of 9 — outcome rarity",
      question: "Is the outcome (disease or event) relatively rare in the population?",
      hint: "Rarity is a key driver of case-control design efficiency. Generally, prevalence below ~10% is considered rare.",
      options: [
        { icon: "ti-arrow-down-circle", label: "Yes — the outcome is rare", sub: "E.g. a specific cancer, rare genetic disorder, uncommon infection", next: "s4a" },
        { icon: "ti-arrow-up-circle", label: "No — the outcome is common", sub: "Cohort or cross-sectional designs may be more appropriate", next: "s4a_common" }
      ]
    },
    s4a: {
      label: "Step 4 of 9 — exposure measurement",
      question: "Can prior exposure be measured or recalled reliably?",
      hint: "Case-control studies depend on accurate retrospective exposure data, from records, biobanks, or participant recall.",
      options: [
        { icon: "ti-database", label: "Yes — records, biomarkers, or reliable recall available", sub: "Medical records, biological samples, validated questionnaires", next: "s5a_ethics" },
        { icon: "ti-help", label: "No — exposure data would rely on poor recall or is unavailable", sub: "Differential recall bias is a major concern", next: "s5a_noreliable" }
      ]
    },
    s4a_common: {
      label: "Step 4 of 9 — exposure measurement",
      question: "Even though the outcome is common, can prior exposure be reliably measured?",
      hint: "If yes, a case-control is still possible but cohort may be preferable due to the common outcome.",
      options: [
        { icon: "ti-database", label: "Yes — exposure can be measured reliably", sub: "A cohort design may be more efficient for a common outcome", next: "s3b" },
        { icon: "ti-help", label: "No — exposure data is unreliable", sub: "Consider a cohort design instead", next: "s3b" }
      ]
    },
    s5a_ethics: {
      label: "Step 5 of 9 — feasibility check",
      question: "Do you have the time and budget for a prospective cohort, or do you need results faster?",
      hint: "Case-control studies are typically faster and cheaper than cohort studies, making them attractive when resources are limited.",
      options: [
        { icon: "ti-clock", label: "I need results quickly or have a limited budget", sub: "Case-control suits time- and resource-constrained settings", next: "result_cc" },
        { icon: "ti-building-bank", label: "I have adequate time and funding", sub: "Consider whether incidence or temporality is essential", next: "result_cc" }
      ]
    },
    s5a_noreliable: {
      label: "Step 5 of 9 — design reconsideration",
      question: "Given poor exposure data availability, would a cohort study measuring exposure prospectively be feasible?",
      hint: "Prospective cohort avoids recall bias by measuring exposure before the outcome occurs.",
      options: [
        { icon: "ti-arrow-forward", label: "Yes — I can enrol participants now and follow them", sub: "Prospective cohort removes recall bias", next: "result_prospective" },
        { icon: "ti-history", label: "No — but historical records (e.g. employment, health records) exist", sub: "Retrospective cohort uses existing records", next: "result_retrospective" }
      ]
    },
    s3b: {
      label: "Step 3 of 9 — timing of follow-up",
      question: "Has the follow-up period already occurred?",
      hint: "The timing of data collection relative to the outcome defines whether the cohort is retrospective or prospective.",
      options: [
        { icon: "ti-history", label: "Yes — outcomes have already happened", sub: "Historical records, employment files, or past registry data are available", next: "s4b_retro" },
        { icon: "ti-calendar-event", label: "No — I will follow participants into the future", sub: "Participants are enrolled now and outcomes will be observed prospectively", next: "s4b_pro" }
      ]
    },
    s4b_retro: {
      label: "Step 4 of 9 — data availability",
      question: "Are complete historical records available for both exposure and outcome ascertainment?",
      hint: "Retrospective cohort studies rely entirely on the quality and completeness of pre-existing records.",
      options: [
        { icon: "ti-file-check", label: "Yes — records are complete and reliable", sub: "Occupational registries, medical records, national databases", next: "s5b_retro" },
        { icon: "ti-file-x", label: "No — records are incomplete or missing", sub: "This limits retrospective cohort feasibility", next: "s5b_retro_partial" }
      ]
    },
    s5b_retro: {
      label: "Step 5 of 9 — exposure rarity",
      question: "Is the exposure relatively rare or specific to a defined group?",
      hint: "Rare exposures are efficiently studied in a cohort by selecting the exposed group first.",
      options: [
        { icon: "ti-arrow-down-circle", label: "Yes — the exposure is uncommon or occupationally specific", sub: "E.g. industrial chemical exposure, radiation, specific medications", next: "result_retrospective" },
        { icon: "ti-users", label: "No — exposure is fairly common", sub: "A random sample cohort or case-control may be more efficient", next: "result_retrospective" }
      ]
    },
    s5b_retro_partial: {
      label: "Step 5 of 9 — alternatives",
      question: "Is any part of the exposure or outcome data available prospectively from now?",
      hint: "Even partial historical data can sometimes be combined with prospective follow-up in an ambidirectional cohort.",
      options: [
        { icon: "ti-arrows-left-right", label: "Yes — some existing data plus future follow-up is possible", sub: "Ambidirectional cohort combining retrospective and prospective elements", next: "result_retrospective" },
        { icon: "ti-x", label: "No — insufficient data for a cohort study", sub: "May need a case-control or primary data collection strategy", next: "result_cc" }
      ]
    },
    s4b_pro: {
      label: "Step 4 of 9 — incidence and temporality",
      question: "Do you need to measure incidence rates or establish clear temporal sequence of exposure before outcome?",
      hint: "Prospective cohort is the gold standard observational design for establishing temporality and measuring incidence.",
      options: [
        { icon: "ti-trending-up", label: "Yes — incidence data or clear temporal order is essential", sub: "Prospective cohort directly measures incidence and time-to-event", next: "s5b_pro_ethics" },
        { icon: "ti-minus", label: "No — prevalence or association data is sufficient", sub: "Less resource-intensive designs may also meet the objective", next: "s5b_pro_ethics" }
      ]
    },
    s5b_pro_ethics: {
      label: "Step 5 of 9 — feasibility and ethics",
      question: "Is long-term follow-up feasible, and are there no ethical barriers to observing the exposure?",
      hint: "Prospective cohorts require sustained funding, participant retention, and that the exposure can be ethically observed without intervention.",
      options: [
        { icon: "ti-check", label: "Yes — follow-up is feasible and ethically sound", sub: "Prospective cohort is appropriate", next: "result_prospective" },
        { icon: "ti-alert-circle", label: "No — follow-up is too long, costly, or raises concerns", sub: "Retrospective cohort or case-control may be more practical", next: "result_prospective" }
      ]
    },
    s_rct: {
      label: "Step 2 of 9 — ethics of randomisation",
      question: "Is it ethical to randomly assign participants to the exposure or intervention?",
      hint: "Randomisation is ethical when there is genuine equipoise, the exposure is not known to be harmful, and participants can give informed consent.",
      options: [
        { icon: "ti-shield-check", label: "Yes — randomisation is safe, ethical, and participants can consent", sub: "Genuine equipoise exists; the intervention is not known to be harmful", next: "s_rct2" },
        { icon: "ti-shield-x", label: "No — randomisation would expose participants to known harm or is not feasible", sub: "Must use an observational design", next: "s2" }
      ]
    },
    s_rct2: {
      label: "Step 3 of 9 — allocation concealment",
      question: "Can allocation be concealed and participants/assessors blinded where appropriate?",
      hint: "Blinding reduces performance and detection bias. Even when full blinding is impossible, allocation concealment is essential.",
      options: [
        { icon: "ti-eye-off", label: "Yes — allocation can be concealed; blinding is possible", sub: "Double-blind or single-blind RCT is achievable", next: "result_rct" },
        { icon: "ti-eye", label: "No — blinding is not possible (e.g. surgical intervention, lifestyle change)", sub: "Open-label RCT; be aware of performance and detection bias", next: "result_rct" }
      ]
    }
  },
  results: {
    result_cc: {
      name: "Case-control study",
      tagline: "Efficient design for rare outcomes — work backwards from disease to exposure",
      icon: "ti-arrow-back-up",
      strengths: ["Efficient for rare or uncommon outcomes","Faster and less expensive than cohort designs","Can study multiple exposures for a single outcome","Useful when the induction period is long","Generates odds ratios (approximate RR when outcome is rare)"],
      limitations: ["Susceptible to recall bias (retrospective exposure ascertainment)","Cannot calculate incidence rates directly","Difficult to study rare exposures","Vulnerable to selection bias in control group definition","Temporal sequence can be ambiguous if exposure is chronic"],
      factors: [{label:"Rare outcome",val:"yes"},{label:"Rare exposure",val:"no"},{label:"Needs incidence",val:"no"},{label:"Time/budget limited",val:"yes"},{label:"Existing records",val:"maybe"},{label:"Randomisation",val:"no"}],
      famous: [
        {name:"Doll and Hill (1950) — smoking and lung cancer",desc:"First landmark case-control study linking cigarette smoking to lung cancer using hospital cases and matched controls."},
        {name:"Wynder and Graham (1950)",desc:"Concurrent US case-control study confirming the smoking–lung cancer association using 684 cases."},
        {name:"Stolley et al. (1978) — oral contraceptives and venous thromboembolism",desc:"Case-control design efficiently detected a rare but serious drug adverse effect."}
      ],
      measure: "Odds ratio (OR) — approximates relative risk when the outcome is rare"
    },
    result_retrospective: {
      name: "Retrospective cohort study",
      tagline: "Harness existing records to reconstruct a historical cohort — efficient when data already exists",
      icon: "ti-history",
      strengths: ["Faster than prospective cohort — outcomes have already occurred","Avoids loss to follow-up during the study period","Efficient for rare or specific exposures (occupational, environmental)","Can calculate incidence rates and relative risks directly","Temporal sequence is clearer than case-control"],
      limitations: ["Dependent entirely on quality of existing records","Limited to variables collected for other purposes","Exposure misclassification risk if records are incomplete","Cannot control confounding by unmeasured factors","Potential for survivor bias"],
      factors: [{label:"Rare outcome",val:"maybe"},{label:"Rare exposure",val:"yes"},{label:"Needs incidence",val:"yes"},{label:"Time/budget limited",val:"yes"},{label:"Existing records",val:"yes"},{label:"Randomisation",val:"no"}],
      famous: [
        {name:"Framingham Heart Study (retrospective analyses)",desc:"Though primarily prospective, Framingham data are used retrospectively to study determinants of cardiovascular outcomes in defined cohorts."},
        {name:"Hamilton County WWTP study",desc:"Used occupational employment records to reconstruct a cohort of wastewater workers exposed to infectious agents."},
        {name:"McMichael et al. — lead smelter workers",desc:"Retrospective cohort using historical employment records to assess lead exposure and mortality outcomes."}
      ],
      measure: "Relative risk (RR), rate ratio, hazard ratio — direct incidence measurement"
    },
    result_prospective: {
      name: "Prospective cohort study",
      tagline: "Follow exposed and unexposed groups forward in time — the observational gold standard for causation",
      icon: "ti-arrow-forward",
      strengths: ["Directly measures incidence rates — strongest observational evidence","Establishes temporal sequence: exposure precedes outcome","Can study multiple outcomes from the same exposure","No recall bias — exposure measured before outcome occurs","Allows investigation of dose-response relationships over time"],
      limitations: ["Expensive and time-consuming, especially for rare or delayed outcomes","Participant attrition and loss to follow-up over time","Inefficient for rare outcomes (requires very large sample sizes)","Exposure status may change during follow-up","Potential for selection bias at recruitment"],
      factors: [{label:"Rare outcome",val:"no"},{label:"Rare exposure",val:"maybe"},{label:"Needs incidence",val:"yes"},{label:"Time/budget limited",val:"no"},{label:"Existing records",val:"no"},{label:"Randomisation",val:"no"}],
      famous: [
        {name:"Framingham Heart Study (1948–ongoing)",desc:"Enrolled 5,209 adults in Framingham, Massachusetts. Identified cholesterol, blood pressure, and smoking as major CVD risk factors."},
        {name:"Nurses Health Study (1976–ongoing)",desc:"Over 120,000 female nurses followed for diet, lifestyle, and chronic disease. Transformed understanding of oral contraceptives, HRT, and diet."},
        {name:"UK Biobank (2006–ongoing)",desc:"500,000 participants with deep phenotyping, genetics, and linkage to health records — a flagship modern prospective cohort."}
      ],
      measure: "Relative risk (RR), incidence rate ratio, hazard ratio"
    },
    result_rct: {
      name: "Randomised controlled trial",
      tagline: "Random allocation eliminates confounding — the gold standard for causal evidence",
      icon: "ti-flask",
      strengths: ["Randomisation controls for known and unknown confounding","Establishes causality more convincingly than observational designs","Blinding reduces performance and detection bias","Pre-specified analysis plan reduces risk of data dredging","Effect size estimates are directly applicable to clinical decisions"],
      limitations: ["Ethical constraints — cannot randomise to harmful exposures","Limited external validity (efficacy does not equal effectiveness in the real world)","Expensive, logistically complex, requires strict protocol adherence","May not be feasible for rare diseases or long latency periods","Volunteer bias — participants may not represent the general population"],
      factors: [{label:"Rare outcome",val:"no"},{label:"Rare exposure",val:"no"},{label:"Needs incidence",val:"yes"},{label:"Randomisation",val:"yes"},{label:"Ethics cleared",val:"yes"},{label:"Time/budget limited",val:"no"}],
      famous: [
        {name:"Medical Research Council Streptomycin Trial (1948)",desc:"First modern RCT. Demonstrated streptomycin's effectiveness against tuberculosis using random allocation and concurrent controls."},
        {name:"Salk Polio Vaccine Trial (1954)",desc:"Enrolled 1.8 million children in the largest clinical trial of the 20th century, proving vaccine efficacy against poliomyelitis."},
        {name:"ALLHAT Trial (2002)",desc:"Randomised 42,000 hypertensive patients to different antihypertensives; reshaped first-line treatment guidelines globally."}
      ],
      measure: "Relative risk (RR), risk difference, number needed to treat (NNT)"
    }
  },
  modifiers: [
    {id:"rare_disease",label:"Outcome is rare (<10%)",icon:"ti-arrow-down-circle",notes:{result_cc:"Rare outcome strongly favours case-control — OR approximates RR well under rarity.",result_retrospective:"If the outcome is also rare, case-control may be more efficient than retrospective cohort.",result_prospective:"Rare outcomes require very large prospective cohorts. A nested case-control may be more efficient.",result_rct:"Rare outcomes in RCTs require very large sample sizes. Adaptive or platform trial designs may help."}},
    {id:"rare_exposure",label:"Exposure is rare",icon:"ti-filter",notes:{result_cc:"Rare exposures are hard to study in case-control — you need very large control groups. Cohort may be better.",result_retrospective:"Rare or specific exposures are the sweet spot for retrospective cohort — select the exposed group directly.",result_prospective:"Rare exposures suit prospective cohort — enrol the exposed group specifically and follow them forward.",result_rct:"If the intervention is uncommon or hard to deliver, consider pragmatic trial design with existing treatment pathways."}},
    {id:"need_incidence",label:"Incidence data needed",icon:"ti-trending-up",notes:{result_cc:"Case-control studies cannot directly calculate incidence. If incidence is essential, consider a cohort design or a nested case-control within a defined cohort.",result_retrospective:"Retrospective cohort directly yields incidence rates — a strength of this design.",result_prospective:"Prospective cohort is ideal for incidence — you measure event rates directly.",result_rct:"RCTs yield cumulative incidence and can calculate NNT — incidence is directly measurable."}},
    {id:"limited_resources",label:"Limited time / budget",icon:"ti-clock",notes:{result_cc:"Case-control is well suited to resource-limited settings — typically faster and cheaper than cohort designs.",result_retrospective:"Retrospective cohort is faster than prospective but requires that suitable records already exist.",result_prospective:"Prospective cohort is resource-intensive. Consider phased funding, data linkage with registries, or nested designs to reduce cost.",result_rct:"RCTs are expensive. Pragmatic designs, adaptive trials, or platform trials can improve efficiency."}}
  ]
};

let history = [];
let currentStep = "s1";
let currentResult = null;
let activeModifiers = new Set();

function updateProgress() {
  const bar = document.getElementById("progressBar");
  const total = CONTENT.maxSteps;
  const done = history.length;
  bar.innerHTML = "";
  for (let i = 0; i < total; i++) {
    const d = document.createElement("div");
    d.className = "progress-step" + (i < done ? " done" : i === done ? " active" : "");
    bar.appendChild(d);
  }
}

function updateBreadcrumb() {
  const bc = document.getElementById("breadcrumb");
  if (history.length === 0) { bc.innerHTML = ""; return; }
  const crumbs = history.map(h => {
    const short = h.optLabel.length > 28 ? h.optLabel.slice(0,26) + "…" : h.optLabel;
    return "<span class='bc-item'>" + short + "</span>";
  });
  bc.innerHTML = crumbs.map((c,i) => i < crumbs.length-1 ? c + "<span class='bc-sep'> › </span>" : c).join("");
}

function renderStep(stepId) {
  const step = CONTENT.steps[stepId];
  if (!step) return;
  updateProgress();
  updateBreadcrumb();
  const container = document.getElementById("stepContainer");
  const backBtn = history.length > 0 ? "<button class='back-btn' onclick='goBack()'><i class='ti ti-arrow-left' aria-hidden='true'></i> Back</button>" : "";
  const opts = step.options.map(function(o) {
    return "<button class='opt-btn' onclick=\"choose('" + stepId + "','" + o.next + "'," + JSON.stringify(o.label) + ")\">" +
      "<i class='ti " + o.icon + " opt-icon' aria-hidden='true'></i>" +
      "<div class='opt-text'><strong>" + o.label + "</strong><span>" + o.sub + "</span></div>" +
      "</button>";
  }).join("");
  container.innerHTML = "<div class='card'>" +
    "<div class='step-label'>" + step.label + "</div>" +
    "<div class='question'>" + step.question + "</div>" +
    "<div class='question-hint'>" + step.hint + "</div>" +
    "<div class='options'>" + opts + "</div>" +
    backBtn + "</div>";
  container.querySelector(".opt-btn").focus();
}

function choose(fromStep, nextId, label) {
  history.push({ stepId: fromStep, optLabel: label });
  if (CONTENT.results[nextId]) {
    showResult(nextId);
  } else {
    currentStep = nextId;
    renderStep(nextId);
  }
}

function goBack() {
  if (history.length === 0) return;
  const last = history.pop();
  currentResult = null;
  activeModifiers.clear();
  updateBreadcrumb();
  renderStep(last.stepId);
}

function showResult(resultId) {
  currentResult = resultId;
  const r = CONTENT.results[resultId];
  updateProgress();
  updateBreadcrumb();
  const modHtml = CONTENT.modifiers.map(function(m) {
    return "<button class='mod-btn' id='mod-" + m.id + "' onclick=\"toggleModifier('" + m.id + "','" + resultId + "')\" aria-pressed='false'>" +
      "<i class='ti " + m.icon + "' aria-hidden='true' style='margin-right:4px'></i>" + m.label + "</button>";
  }).join("");
  const famousHtml = r.famous.map(function(f) {
    return "<div class='famous-card'><h4>" + f.name + "</h4><p>" + f.desc + "</p></div>";
  }).join("");
  const tagsHtml = r.factors.map(function(f) {
    return "<span class='tag " + f.val + "'>" + f.label + "</span>";
  }).join("");
  const strengthsHtml = r.strengths.map(function(s){ return "<li>" + s + "</li>"; }).join("");
  const limitsHtml = r.limitations.map(function(l){ return "<li>" + l + "</li>"; }).join("");
  document.getElementById("stepContainer").innerHTML =
    "<div class='result-card' style='border:0.5px solid var(--color-border-tertiary)'>" +
      "<div class='result-header' style='background:var(--color-background-secondary)'>" +
        "<div style='display:flex;align-items:center;gap:8px;margin-bottom:6px'>" +
          "<i class='ti " + r.icon + "' aria-hidden='true' style='font-size:22px;color:var(--color-text-secondary)'></i>" +
          "<div class='result-name'>" + r.name + "</div>" +
        "</div>" +
        "<div class='result-tagline' style='color:var(--color-text-secondary)'>" + r.tagline + "</div>" +
      "</div>" +
      "<div class='result-body'>" +
        "<div class='result-section'><h3>Measure of association</h3><p>" + r.measure + "</p></div>" +
        "<div class='result-section'><h3>Design suitability</h3><div class='tag-row'>" + tagsHtml + "</div>" +
          "<p style='font-size:11px;color:var(--color-text-tertiary);margin-top:4px'>" +
          "<span class='tag yes' style='font-size:10px'>Favourable</span> &nbsp;" +
          "<span class='tag no' style='font-size:10px'>Unfavourable</span> &nbsp;" +
          "<span class='tag maybe' style='font-size:10px'>Context-dependent</span></p></div>" +
        "<div class='result-section'><h3>Key strengths</h3><ul>" + strengthsHtml + "</ul></div>" +
        "<div class='result-section'><h3>Limitations to consider</h3><ul>" + limitsHtml + "</ul></div>" +
        "<div class='result-section'><h3>Famous examples</h3>" + famousHtml + "</div>" +
        "<div class='modifier-section'><h3>Explore additional factors</h3>" +
          "<div class='modifier-grid'>" + modHtml + "</div>" +
          "<div id='modifier-notes'></div></div>" +
      "</div>" +
    "</div>" +
    "<button class='restart-btn' onclick='restart()'><i class='ti ti-refresh' aria-hidden='true'></i> Start over</button>";
}

function toggleModifier(modId, resultId) {
  const btn = document.getElementById("mod-" + modId);
  if (activeModifiers.has(modId)) {
    activeModifiers.delete(modId);
    btn.classList.remove("active");
    btn.setAttribute("aria-pressed","false");
  } else {
    activeModifiers.add(modId);
    btn.classList.add("active");
    btn.setAttribute("aria-pressed","true");
  }
  const notes = document.getElementById("modifier-notes");
  if (activeModifiers.size === 0) { notes.innerHTML = ""; return; }
  notes.innerHTML = Array.from(activeModifiers).map(function(id) {
    const m = CONTENT.modifiers.find(function(x){ return x.id === id; });
    return "<div class='modifier-note'><strong>" + m.label + ":</strong> " + m.notes[resultId] + "</div>";
  }).join("");
}

function restart() {
  history = [];
  currentResult = null;
  currentStep = "s1";
  activeModifiers.clear();
  updateBreadcrumb();
  renderStep("s1");
}

renderStep("s1");
</script>
</body>
</html>
