<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Celebration Timer</title>

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --secondary: #e5e7eb;
      --secondary-hover: #d1d5db;
      --success: #10b981;
      --shadow: 0 12px 30px rgba(0,0,0,0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background:
        radial-gradient(circle at top left, #ddd6fe, transparent 30%),
        radial-gradient(circle at bottom right, #bfdbfe, transparent 30%),
        var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    main {
      width: 100%;
      max-width: 560px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    .subtitle {
      margin-bottom: 2rem;
      line-height: 1.6;
      color: #4b5563;
    }

    .timer-display {
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: bold;
      margin: 1.5rem 0;
      letter-spacing: 2px;
    }

    .time-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .time-btn {
      border: none;
      background: var(--secondary);
      padding: 0.9rem;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .time-btn:hover {
      background: var(--secondary-hover);
      transform: translateY(-2px);
    }

    .time-btn.active {
      background: var(--primary);
      color: white;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .control-btn {
      border: none;
      border-radius: 999px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      min-width: 140px;
    }

    .start-btn {
      background: var(--primary);
      color: white;
    }

    .start-btn:hover {
      background: var(--primary-hover);
    }

    .reset-btn {
      background: var(--secondary);
      color: var(--text);
    }

    .reset-btn:hover {
      background: var(--secondary-hover);
    }

    button:focus-visible {
      outline: 4px solid #c4b5fd;
      outline-offset: 3px;
    }

    .status {
      margin-top: 1.5rem;
      min-height: 1.5rem;
      font-weight: bold;
      color: var(--success);
    }

    @media (max-width: 500px) {
      .card {
        padding: 1.5rem;
      }

      .controls {
        flex-direction: column;
      }

      .control-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="card" aria-labelledby="app-title">
      <h1 id="app-title">Pomodoro Timer</h1>

      <p class="subtitle">
        Choose a focus session length, start the timer,
        and celebrate with confetti when time is up.
      </p>

      <div
        id="timerDisplay"
        class="timer-display"
        aria-live="polite"
        aria-atomic="true"
      >
        00:30
      </div>

      <div
        class="time-options"
        role="group"
        aria-label="Select timer duration"
        id="timeOptions"
      ></div>

      <div class="controls">
        <button
          id="startPauseBtn"
          class="control-btn start-btn"
          type="button"
          aria-label="Start or pause timer"
        >
          Start
        </button>

        <button
          id="resetBtn"
          class="control-btn reset-btn"
          type="button"
          aria-label="Reset timer"
        >
          Reset
        </button>
      </div>

      <div
        id="statusMessage"
        class="status"
        role="status"
        aria-live="polite"
      ></div>
    </section>
  </main>

  <script>
    /************************************************************
     * EDITABLE CONTENT
     * Update timer options/messages here only
     ************************************************************/
    const APP_CONFIG = {
      timerOptions: [
        { label: "30 Sec", seconds: 30 },
        { label: "5 Min", seconds: 300 },
        { label: "10 Min", seconds: 600 },
        { label: "15 Min", seconds: 900 },
        { label: "25 Min", seconds: 1500 }
      ],

      completionMessages: [
        "Great job!",
        "Session complete!",
        "You crushed it!",
        "Time for a break!",
        "Awesome focus session!"
      ]
    };

    /************************************************************
     * APP STATE
     ************************************************************/
    let selectedSeconds = APP_CONFIG.timerOptions[0].seconds;
    let remainingSeconds = selectedSeconds;
    let timerInterval = null;
    let isRunning = false;

    /************************************************************
     * DOM ELEMENTS
     ************************************************************/
    const timerDisplay = document.getElementById("timerDisplay");
    const startPauseBtn = document.getElementById("startPauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusMessage = document.getElementById("statusMessage");
    const timeOptionsContainer = document.getElementById("timeOptions");

    /************************************************************
     * CREATE TIME OPTION BUTTONS
     ************************************************************/
    APP_CONFIG.timerOptions.forEach((option, index) => {
      const button = document.createElement("button");

      button.type = "button";
      button.className = "time-btn";
      button.textContent = option.label;
      button.setAttribute("aria-label", `Set timer for ${option.label}`);

      if (index === 0) {
        button.classList.add("active");
      }

      button.addEventListener("click", () => {
        if (isRunning) return;

        document.querySelectorAll(".time-btn").forEach(btn => {
          btn.classList.remove("active");
        });

        button.classList.add("active");

        selectedSeconds = option.seconds;
        remainingSeconds = selectedSeconds;

        updateDisplay();
        statusMessage.textContent = "";
      });

      timeOptionsContainer.appendChild(button);
    });

    /************************************************************
     * FORMAT TIME
     ************************************************************/
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;

      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    /************************************************************
     * UPDATE TIMER DISPLAY
     ************************************************************/
    function updateDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
    }

    /************************************************************
     * RANDOM MESSAGE
     ************************************************************/
    function getRandomMessage() {
      const messages = APP_CONFIG.completionMessages;
      return messages[Math.floor(Math.random() * messages.length)];
    }

    /************************************************************
     * PLAY ALARM SOUND
     ************************************************************/
    function playAlarm() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();

      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();

      gainNode.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + 1.5
      );

      oscillator.stop(audioContext.currentTime + 1.5);
    }

    /************************************************************
     * CONFETTI CELEBRATION
     ************************************************************/
    function celebrate() {
      confetti({
        particleCount: 180,
        spread: 100,
        origin: { y: 0.6 }
      });

      confetti({
        particleCount: 120,
        angle: 60,
        spread: 70,
        origin: { x: 0 }
      });

      confetti({
        particleCount: 120,
        angle: 120,
        spread: 70,
        origin: { x: 1 }
      });
    }

    /************************************************************
     * TIMER COMPLETE
     ************************************************************/
    function completeTimer() {
      clearInterval(timerInterval);
      isRunning = false;

      startPauseBtn.textContent = "Start";

      playAlarm();
      celebrate();

      statusMessage.textContent = getRandomMessage();
    }

    /************************************************************
     * START / PAUSE TIMER
     ************************************************************/
    function toggleTimer() {
      if (!isRunning) {
        isRunning = true;
        startPauseBtn.textContent = "Pause";

        timerInterval = setInterval(() => {
          remainingSeconds--;

          updateDisplay();

          if (remainingSeconds <= 0) {
            completeTimer();
          }
        }, 1000);

      } else {
        clearInterval(timerInterval);
        isRunning = false;
        startPauseBtn.textContent = "Start";
      }
    }

    /************************************************************
     * RESET TIMER
     ************************************************************/
    function resetTimer() {
      clearInterval(timerInterval);

      isRunning = false;
      remainingSeconds = selectedSeconds;

      updateDisplay();

      startPauseBtn.textContent = "Start";
      statusMessage.textContent = "";
    }

    /************************************************************
     * EVENT LISTENERS
     ************************************************************/
    startPauseBtn.addEventListener("click", toggleTimer);
    resetBtn.addEventListener("click", resetTimer);

    /************************************************************
     * INITIALIZE DISPLAY
     ************************************************************/
    updateDisplay();
  </script>
</body>
</html>
